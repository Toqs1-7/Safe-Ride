                        const answer = document.querySelector(`.faq-a-input[data-id="${id}"]`)?.value || '';
                        faqs.push({ id, question: input.value, answer });
                    });
                    DB.setFAQs(faqs);
                    toast('FAQ saved!');
                    renderApp();
                    return;
                }

                // Add FAQ
                if (e.target.closest('#addFaqBtn')) {
                    const list = document.getElementById('faqAdminList');
                    const newId = uid();
                    const div = document.createElement('div');
                    div.className = 'form-group';
                    div.style.cssText =
                        'border:1px solid var(--gray-200);padding:16px;border-radius:var(--radius-sm);margin-bottom:12px;';
                    div.innerHTML =
                        `<label>Question</label><input class="faq-q-input" data-id="${newId}" value="" /><label style="margin-top:8px;">Answer</label><textarea class="faq-a-input" data-id="${newId}" rows="3"></textarea><button class="btn btn-danger btn-sm delete-faq-btn mt-2" data-faq-id="${newId}"><i class="fas fa-trash"></i> Delete</button>`;
                    list.appendChild(div);
                    return;
                }

                // Delete FAQ
                const delFaqBtn = e.target.closest('.delete-faq-btn');
                if (delFaqBtn) {
                    if (confirm('Delete this FAQ?')) { delFaqBtn.closest('.form-group').remove(); }
                    return;
                }

                // Save Emergency
                if (e.target.closest('#saveEmergencyBtn')) {
                    const settings = getSettings();
                    const emergencyNumbers = [];
                    document.querySelectorAll('.emergency-name').forEach(input => {
                        const idx = input.dataset.index;
                        const number = document.querySelector(`.emergency-number[data-index="${idx}"]`)
                            ?.value || '';
                        const icon = document.querySelector(`.emergency-icon[data-index="${idx}"]`)?.value ||
                            'fa-phone';
                        emergencyNumbers.push({ name: input.value, number, icon });
                    });
                    settings.emergencyNumbers = emergencyNumbers;
                    DB.setSettings(settings);
                    toast('Emergency numbers saved!');
                    renderApp();
                    return;
                }

                // Add Emergency
                if (e.target.closest('#addEmergencyBtn')) {
                    const list = document.getElementById('emergencyAdminList');
                    const idx = list.children.length;
                    const div = document.createElement('div');
                    div.className = 'form-group';
                    div.style.cssText = 'display:flex;gap:12px;align-items:flex-end;';
                    div.innerHTML =
                        `<div style="flex:1;"><label>Name</label><input class="emergency-name" data-index="${idx}" value="" /></div><div style="flex:1;"><label>Number</label><input class="emergency-number" data-index="${idx}" value="" /></div><div style="flex:1;"><label>Icon Class</label><input class="emergency-icon" data-index="${idx}" value="fa-phone" /></div><button class="btn btn-danger btn-sm delete-emergency-btn" data-index="${idx}"><i class="fas fa-trash"></i></button>`;
                    list.appendChild(div);
                    return;
                }

                // Delete Emergency
                const delEmergencyBtn = e.target.closest('.delete-emergency-btn');
                if (delEmergencyBtn) {
                    if (confirm('Delete this emergency number?')) { delEmergencyBtn.closest('.form-group')
                        .remove(); }
                    return;
                }

                // Place Bid (Driver)
                const placeBidBtn = e.target.closest('.place-bid-btn');
                if (placeBidBtn) {
                    const bidId = placeBidBtn.dataset.bidId;
                    const priceInput = document.getElementById(`bidPrice_${bidId}`);
                    const price = parseInt(priceInput?.value) || 0;
                    const driver = getCurrentDriver();
                    if (!driver) { toast('Driver profile not found', 'error'); return; }
                    const bids = DB.getBids();
                    const bid = bids.find(b => b.id === bidId);
                    if (bid) {
                        const existing = bid.bids.find(b => b.driverId === driver.id);
                        if (existing) { existing.price = price; } else { bid.bids.push({ driverId: driver.id,
                                price, timestamp: new Date().toISOString() }); }
                        DB.setBids(bids);
                        toast('Bid placed successfully!');
                        renderApp();
                    }
                    return;
                }

                // Accept Bid (Parent)
                const acceptBidBtn = e.target.closest('.accept-bid-btn');
                if (acceptBidBtn) {
                    const bidId = acceptBidBtn.dataset.bidId;
                    const driverId = acceptBidBtn.dataset.driverId;
                    const bids = DB.getBids();
                    const bid = bids.find(b => b.id === bidId);
                    if (bid) {
                        const driverBid = bid.bids.find(b => b.driverId === driverId);
                        const finalPrice = driverBid ? driverBid.price : bid.offeredPrice;
                        bid.status = 'accepted';
                        DB.setBids(bids);
                        const bookings = DB.getBookings();
                        bookings.push({ id: uid(), parentId: bid.parentId, driverId, studentName: bid.studentName,
                            pickup: bid.pickup, dropoff: bid.dropoff, date: bid.date, time: bid.time,
                            genderPreference: bid.genderPreference, status: 'accepted', price: finalPrice,
                            createdAt: new Date().toISOString() });
                        DB.setBookings(bookings);
                        toast('Bid accepted! Booking confirmed.');
                        renderApp();
                    }
                    return;
                }

                // Refresh verification status
                if (e.target.closest('#refreshVerification')) {
                    toast('Checking verification status...');
                    renderApp();
                    return;
                }
                if (e.target.closest('#modalOverlay') && !e.target.closest('.modal')) closeModal();
                if (e.target.closest('#modalCloseBtn')) closeModal();
            });
        }
